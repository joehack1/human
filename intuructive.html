<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .content {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .svg-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        .info-panel {
            flex: 0 0 300px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            min-height: 600px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .info-panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .info-panel p {
            color: #555;
            line-height: 1.8;
            font-size: 0.95em;
        }

        .body-part {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .body-part:hover {
            opacity: 0.8;
            filter: brightness(1.2);
        }

        .default-message {
            color: #999;
            font-style: italic;
            text-align: center;
            margin-top: 100px;
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .info-panel {
                flex: 1;
                width: 100%;
                min-height: auto;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>

            },
            'right-toe4': {
                name: 'Right Fourth Toe',
                info: 'This toe helps maintain lateral balance and contributes to the foot\'s natural flexibility. It adjusts to terrain changes and helps prevent ankle rolling.'
            },
            'right-toe5': {
                name: 'Right Fifth Toe (Pinky)',
                info: 'The pinky toe helps with lateral balance and is important for athletes in sports requiring quick direction changes. It may seem small, but losing it would affect your gait and balance significantly.'
            }
        };

        const bodyPartElements = document.querySelectorAll('.body-part');
        const partName = document.getElementById('part-name');
        const partInfo = document.getElementById('part-info');

        bodyPartElements.forEach(element => {
            element.addEventListener('mouseenter', function() {
                const partKey = this.getAttribute('data-part');
                const part = bodyParts[partKey];
                
                if (part) {
                    partName.textContent = part.name;
                    partInfo.textContent = part.info;
                    partInfo.classList.remove('default-message');
                }
            });

            element.addEventListener('mouseleave', function() {
                partName.textContent = 'Welcome!';
                partInfo.textContent = 'Hover over any body part to learn interesting facts about it.';
                partInfo.classList.add('default-message');
            });
        });
    </script>
</body>
</html>
