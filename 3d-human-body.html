<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Human Body with Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 16px;
        }
        
        #data {
            font-weight: bold;
            color: #007bff;
            font-size: 18px;
            margin-top: 10px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            color: #666;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <h2>3D Human Body Model</h2>
        <p>Click on body parts to see their names</p>
        <div id="data">Area: <span id="part-name">-</span></div>
    </div>
    
    <div id="controls">
        Controls: Left click to rotate • Right click to pan • Scroll to zoom
    </div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        scene.fog = new THREE.Fog(0xf0f0f0, 10, 50);

        // Camera setup
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0xffaa00, 0.5);
        pointLight.position.set(-10, 5, -10);
        scene.add(pointLight);

        // Materials
        const bodyMaterial = new THREE.MeshStandardMaterial({
            color: 0xffd3b6,
            roughness: 0.4,
            metalness: 0.1
        });

        const highlightMaterial = new THREE.MeshStandardMaterial({
            color: 0xff7d16,
            roughness: 0.4,
            metalness: 0.1
        });

        // Body parts container
        const bodyParts = [];

        // Helper function to create body part
        function createBodyPart(geometry, position, rotation, scale, name) {
            const mesh = new THREE.Mesh(geometry, bodyMaterial);
            mesh.position.copy(position);
            mesh.rotation.copy(rotation);
            mesh.scale.copy(scale);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { name: name };
            scene.add(mesh);
            bodyParts.push(mesh);
            return mesh;
        }
